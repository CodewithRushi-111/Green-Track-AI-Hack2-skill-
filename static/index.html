<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenTrack AI - Personal Carbon Footprint Tracker</title>
    <meta name="description" content="GreenTrack AI is a full-stack, AI-powered carbon footprint tracker and recommendation engine designed to help individuals understand, track, and reduce their carbon footprint.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dark-theme">
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <svg viewBox="0 0 100 100" width="36" height="36" class="logo-icon" aria-hidden="true" style="overflow: visible;">
                    <defs>
                        <linearGradient id="logo-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="var(--accent-color)" />
                            <stop offset="100%" stop-color="hsl(var(--hue-emerald), 70%, 55%)" />
                        </linearGradient>
                        <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="hsl(82, 85%, 55%)" />
                            <stop offset="100%" stop-color="hsl(var(--hue-emerald), 80%, 40%)" />
                        </linearGradient>
                    </defs>
                    <path d="M15,80 Q45,80 50,50 T85,20" fill="none" stroke="url(#logo-grad)" stroke-width="6" stroke-linecap="round" />
                    <path d="M50,50 C55,30 75,25 85,20 C80,40 65,45 50,50 Z" fill="url(#leaf-grad)" />
                    <path d="M30,65 C35,50 50,45 58,42 C53,55 42,60 30,65 Z" fill="url(#leaf-grad)" opacity="0.85" />
                    <circle cx="85" cy="20" r="4" fill="#ffffff" />
                </svg>
                <span class="logo-text" style="display: flex; align-items: center; gap: 4px;">GreenTrack<span class="accent-text">AI</span></span>
            </div>
            
            <nav class="app-nav" aria-label="Main Navigation">
                <ul class="nav-links" id="nav-links">
                    <li><a href="#/dashboard" class="nav-link" id="nav-dashboard">Dashboard</a></li>
                    <li><a href="#/tracker" class="nav-link" id="nav-tracker">Track Footprint</a></li>
                    <li><a href="#/recommendations" class="nav-link" id="nav-recommendations">AI Insights</a></li>
                    <li><a href="#/challenges" class="nav-link" id="nav-challenges">Eco Challenges</a></li>
                    <li><a href="#/offsets" class="nav-link" id="nav-offsets">Offset Projects</a></li>
                </ul>
            </nav>


            <div class="header-actions">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark and light mode">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                        <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="2"/>
                        <path d="M12,1v2M12,21v2M4.22,4.22l1.42,1.42M18.36,18.36l1.42,1.42M1,12h2M21,12h2M4.22,19.78l1.42-1.42M18.36,5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                        <path fill="currentColor" d="M12,3A9,9,0,1,0,21,12,9,9,0,0,0,12,3Z" />
                    </svg>
                </button>
                <div id="user-points-badge" class="points-badge hidden" title="Your total Eco Points">
                    <span class="badge-icon">🌱</span>
                    <span id="user-points-val">0</span> pts
                </div>
                <div id="auth-status-area">
                    <a href="#/login" class="btn btn-primary" id="auth-btn">Sign In</a>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="app-main" tabindex="-1">
        <div id="app-router-outlet">
            <!-- Dynamic pages will render here -->
            <div class="loading-container">
                <div class="spinner"></div>
                <p>Initializing GreenTrack AI...</p>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="footer-container">
            <p>&copy; 2026 GreenTrack AI. Empowering personal carbon reduction.</p>
            <div class="footer-meta">
                <span class="meta-tag">Code Quality Certified</span>
                <span class="meta-tag">WCAG 2.1 compliant</span>
                <span class="meta-tag">Gemini-Powered</span>
            </div>
        </div>
    </footer>

    <!-- Templates / Modals will be dynamically mounted or created by JS -->
    
    <!-- Scripts -->
    <script src="/js/state.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
